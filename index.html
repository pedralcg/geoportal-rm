<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Geoportal Ambiental de la Región de Murcia - Visualización y gestión de datos ambientales"
    />
    <title>Geoportal Ambiental RM</title>

    <!-- Estilos externos -->
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>

  <body>
    <!-- Header Principal -->
    <header>
      <h1>🌿 Geoportal Ambiental RM</h1>

      <div class="search-container">
        <i class="fas fa-search search-icon"></i>
        <input
          type="text"
          id="search-input"
          placeholder="Buscar municipio..."
          class="search-input"
          autocomplete="off"
        />
        <div id="search-results" class="search-results"></div>
      </div>
    </header>

    <!-- Sidebar Izquierdo -->
    <aside class="sidebar" id="left-sidebar">
      <!-- Capas -->
      <div class="sidebar-header">
        <h2><i class="fas fa-layer-group"></i> Capas</h2>
      </div>

      <div class="sidebar-content">
        <div class="layers-section">
          <div id="layers" class="layers-container"></div>
        </div>

        <!-- Mapas Base -->
        <div class="layers-section">
          <h3 class="section-title">Mapa Base</h3>
          <select id="basemap-select" class="form-select"></select>
        </div>

        <!-- Herramientas -->
        <div class="layers-section">
          <h3 class="section-title">Herramientas</h3>
          <!-- Funcionalidades avanzadas removidas en MVP -->
        </div>

        <!-- Acciones Principales -->
        <button class="btn btn-primary" id="toggle-anotacion-sidebar">
          <i class="fas fa-map-pin"></i>
          Añadir Anotación
        </button>

        <button class="btn btn-secondary" id="toggle-contact">
          <i class="fas fa-headset"></i>
          Contacto
        </button>
      </div>
    </aside>

    <!-- Mapa Principal -->
    <main class="map-container">
      <div id="map"></div>

      <!-- Controles del Mapa -->
      <div class="map-controls">
        <button
          class="control-btn"
          id="btn-clear-filters"
          title="Limpiar filtros"
        >
          <i class="fas fa-eraser"></i>
        </button>

        <button class="control-btn" id="btn-my-location" title="Mi ubicación">
          <i class="fas fa-location-arrow"></i>
        </button>

        <button class="control-btn" id="btn-fit-bounds" title="Vista completa">
          <i class="fas fa-compress-arrows-alt"></i>
        </button>
      </div>

      <!-- Panel de Estado -->
      <div id="status" class="notification"></div>
    </main>

    <!-- Sidebar Derecho: Anotaciones -->
    <aside class="sidebar right-sidebar hidden" id="right-sidebar">
      <div class="sidebar-header">
        <h2><i class="fas fa-paper-plane"></i> Añadir Anotación</h2>
        <button class="btn-icon" id="close-anotacion-sidebar">
          <i class="fas fa-times"></i>
        </button>
      </div>

      <div class="sidebar-content">
        <form id="anotacion-form">
          <div class="form-group">
            <label for="nombre" class="form-label">Nombre *</label>
            <input
              type="text"
              id="nombre"
              class="form-input"
              placeholder="Tu nombre"
              required
            />
          </div>

          <div class="form-group">
            <label for="tipo" class="form-label">Tipo de Anotación *</label>
            <select id="tipo" class="form-select" required>
              <option value="">Seleccione...</option>
              <option value="riesgo_incendio">🔥 Riesgo de Incendio</option>
              <option value="plaga_forestal">🐛 Plaga Forestal</option>
              <option value="inventario_forestal">
                🌲 Inventario Forestal
              </option>
              <option value="fauna">🐾 Fauna Silvestre</option>
              <option value="punto_control_lidar">
                📍 Punto Control LiDAR
              </option>
              <option value="validacion_datos_gis">🗺️ Validación GIS</option>
              <option value="otro">⚠️ Otro</option>
            </select>
          </div>

          <div class="form-group">
            <label for="comentarios" class="form-label">Comentarios *</label>
            <textarea
              id="comentarios"
              class="form-textarea"
              placeholder="Describe la observación..."
              required
            ></textarea>
          </div>

          <div class="form-group">
            <label class="form-label">Ubicación *</label>

            <div class="coords-display" id="coords-display-container">
              <i class="fas fa-crosshairs"></i>
              <span id="coords-text">No seleccionada</span>
            </div>

            <button type="button" id="pick-on-map" class="btn btn-secondary">
              <i class="fas fa-map-marker-alt"></i>
              Seleccionar en Mapa
            </button>

            <div class="coords-manual">
              <input
                type="number"
                id="lat-input"
                placeholder="Latitud"
                step="any"
                class="form-input"
              />
              <input
                type="number"
                id="lng-input"
                placeholder="Longitud"
                step="any"
                class="form-input"
              />
              <button
                type="button"
                id="set-manual-coords"
                class="btn btn-secondary"
              >
                <i class="fas fa-check"></i>
                Fijar
              </button>
            </div>
          </div>

          <button type="button" id="anotacion-send" class="btn btn-primary">
            <i class="fas fa-paper-plane"></i>
            Guardar Anotación
          </button>
        </form>
      </div>
    </aside>

    <!-- Modal: Contacto -->
    <div class="modal-overlay" id="contact-modal-overlay">
      <div class="modal">
        <div class="modal-header">
          <h3 class="modal-title">
            <i class="fas fa-headset"></i> Contacto y Soporte
          </h3>
          <button class="modal-close" id="close-contact-modal">×</button>
        </div>

        <div class="modal-body">
          <p>Para soporte o información adicional:</p>
          <ul class="contact-list">
            <li>
              <i class="fas fa-user-circle"></i>
              <strong>Pedro Alcoba Gómez</strong>
            </li>
            <li>
              <i class="fas fa-envelope"></i>
              <a href="mailto:pedralcg.dev@gmail.com">pedralcg.dev@gmail.com</a>
            </li>
            <li>
              <i class="fab fa-github"></i>
              <a
                href="https://github.com/pedralcg/pedralcg"
                target="_blank"
                rel="noopener"
              >
                github.com/pedralcg
              </a>
            </li>
          </ul>
        </div>
      </div>
    </div>

    <!-- Modales avanzados removidos en MVP -->

    <!-- Scripts -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script type="module" src="main.js"></script>
  </body>
</html>
